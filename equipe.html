<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Evolution - Equipe</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>:root{--bs-accent:#0dcaf0;}body{background-color:#212529;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;}::-webkit-scrollbar{width:6px;height:6px;}::-webkit-scrollbar-track{background:#1e2124;border-radius:4px;}::-webkit-scrollbar-thumb{background:#495057;border-radius:4px;}::-webkit-scrollbar-thumb:hover{background:var(--bs-accent);}.navbar{background-color:#343a40!important;border-bottom:2px solid var(--bs-accent);box-shadow:0 4px 10px rgba(0,0,0,0.5);}.kanban-board{display:flex;gap:15px;overflow-x:auto;padding-bottom:15px;align-items:flex-start;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}.kanban-col{background-color:#1e2124;border-radius:10px;min-width:320px;width:320px;max-width:85vw;padding:15px;border:1px solid #495057;scroll-snap-align:start;display:flex;flex-direction:column;max-height:75vh;}.kanban-cards-container{overflow-y:auto;flex-grow:1;padding-right:5px;}.kanban-col-header{font-weight:bold;text-transform:uppercase;letter-spacing:1px;padding-bottom:10px;border-bottom:3px solid #6c757d;margin-bottom:15px;display:flex;justify-content:space-between;}.k-card{background-color:#2b3035;border-radius:8px;padding:15px;margin-bottom:12px;border-left:4px solid var(--bs-accent);box-shadow:0 4px 6px rgba(0,0,0,0.3);}.k-placa{font-size:1.3rem;font-weight:900;color:var(--bs-accent)!important;}.media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}.media-box{position:relative;aspect-ratio:1;background-color:#1e2124;border-radius:8px;overflow:hidden;border:1px solid #495057;display:flex;align-items:center;justify-content:center;}.media-box img,.media-box video{width:100%;height:100%;object-fit:cover;}.btn-del-media{position:absolute;top:5px;right:5px;background:rgba(220,53,69,0.9);border:none;border-radius:50%;color:white;width:25px;height:25px;font-size:12px;cursor:pointer;z-index:10;}footer{background-color:#111;padding:15px;text-align:center;border-top:1px solid #333;margin-top:auto;font-size:0.85rem;}.spin{animation:spin 1s infinite linear;}@keyframes spin{100%{transform:rotate(360deg);}}</style>
</head>
<body>
<div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer" style="z-index: 9999;"></div>

<nav class="navbar navbar-expand-lg py-3"><div class="container-fluid px-4"><a class="navbar-brand fs-4" href="#"><i class="bi bi-tools me-2 text-info"></i>Painel da Equipe</a><div class="d-flex align-items-center gap-3"><span class="text-white-50 fw-bold">Oficina: <span id="navTenantName" class="text-info"></span></span><span class="text-white-50 fw-bold">Login: <span id="navUserName" class="text-warning"></span></span><button class="btn btn-outline-danger fw-bold border-0" onclick="sair()"><i class="bi bi-power"></i> Sair</button></div></div></nav>

<div class="container-fluid mt-4 flex-grow-1 px-4">
    <div class="d-flex justify-content-between align-items-center mb-4"><h3 class="fw-bold"><i class="bi bi-kanban text-info me-2"></i> Pátio (Kanban)</h3><div class="d-flex gap-2"><input type="text" id="searchOS" class="form-control bg-dark text-white border-secondary" placeholder="Buscar Placa..." onkeyup="renderKanban()" style="width: 250px;"><button class="btn btn-info fw-bold text-dark px-4 shadow" data-bs-toggle="modal" data-bs-target="#modalOS" onclick="prepararModalOS('add')"><i class="bi bi-plus-lg me-2"></i> NOVA O.S.</button></div></div>
    <div class="kanban-board" id="quadroKanban">
        <div class="kanban-col"><div class="kanban-col-header" style="border-color:#6c757d;"><span>Avaliação</span> <span class="badge bg-secondary" id="count-Aguardando">0</span></div><div id="kb-Aguardando" class="kanban-cards-container d-flex flex-column gap-2"></div></div>
        <div class="kanban-col"><div class="kanban-col-header" style="border-color:#ffc107;"><span>Orçamentado</span> <span class="badge bg-secondary" id="count-Orcamento">0</span></div><div id="kb-Orcamento" class="kanban-cards-container d-flex flex-column gap-2"></div></div>
        <div class="kanban-col"><div class="kanban-col-header" style="border-color:#0dcaf0;"><span>Aprovado/Fila</span> <span class="badge bg-secondary" id="count-Aprovado">0</span></div><div id="kb-Aprovado" class="kanban-cards-container d-flex flex-column gap-2"></div></div>
        <div class="kanban-col"><div class="kanban-col-header" style="border-color:#fd7e14;"><span>No Elevador</span> <span class="badge bg-secondary" id="count-Andamento">0</span></div><div id="kb-Andamento" class="kanban-cards-container d-flex flex-column gap-2"></div></div>
        <div class="kanban-col"><div class="kanban-col-header" style="border-color:#198754;"><span>Entregue</span> <span class="badge bg-secondary" id="count-Concluido">0</span></div><div id="kb-Concluido" class="kanban-cards-container d-flex flex-column gap-2"></div></div>
    </div>
</div>

<div class="modal fade" id="modalOS" tabindex="-1" data-bs-backdrop="static"><div class="modal-dialog modal-xl modal-dialog-scrollable"><div class="modal-content border-info"><div class="modal-header py-3 bg-dark border-info"><h4 class="modal-title text-info fw-bold"><i class="bi bi-tools"></i> Ficha Técnica</h4><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div><div class="modal-body p-4 bg-dark"><form id="formOS" onsubmit="salvarOS(event)"><input type="hidden" id="osId"><input type="hidden" id="osMediaArray" value="[]">
    <div class="row g-4 mb-4"><div class="col-md-6"><label class="form-label text-white-50">Cliente</label><select class="form-select bg-black text-white" id="osCliente" required onchange="filtrarMotosOS()"></select></div><div class="col-md-6"><label class="form-label text-white-50">Veículo</label><select class="form-select bg-black text-white" id="osMoto" required></select></div></div>
    <div class="mb-4"><label class="form-label text-white">Problema / Serviço</label><textarea class="form-control bg-black text-white" id="osDescricao" rows="3" required></textarea></div>
    <div class="row g-4 mb-4 p-4 rounded-4 bg-black border border-secondary"><div class="col-md-6"><label class="form-label text-info">Fase do Serviço</label><select class="form-select border-info text-info bg-dark" id="osStatus"><option value="Aguardando">Avaliação</option><option value="Orcamento">Enviar Orçamento</option><option value="Aprovado">Aprovado (Fila)</option><option value="Andamento">No Elevador</option><option value="Concluido">Finalizar Pátio (Informar Dono)</option></select></div><div class="col-md-6"><label class="form-label text-white-50">Data Entrada</label><input type="date" class="form-control bg-dark text-white" id="osData" required></div></div>
    
    <div class="p-4 rounded-4 border border-success mb-4" style="background-color:#1e2124;"><h5 class="text-success mb-3"><i class="bi bi-box-seam"></i> Peças Necessárias e Mão de Obra</h5><div class="row align-items-center mb-4 border-bottom pb-3"><div class="col-md-4"><label class="text-white-50">Mão de Obra (R$)</label></div><div class="col-md-8"><input type="number" step="0.01" class="form-control border-success bg-black text-white text-end fw-bold" id="osMaoObra" value="0" oninput="calcOsTotal()"></div></div><div id="containerPecasOS" class="d-flex flex-column gap-2 mb-3"></div><button type="button" class="btn btn-outline-success rounded-pill px-4" onclick="adicionarPecaOS()">+ Inserir Peça</button><div class="d-flex justify-content-between mt-4"><h4 class="text-white">TOTAL:</h4><h2 class="text-success fw-bold">R$ <span id="osTotalValor">0.00</span></h2><input type="hidden" id="osTotalHidden" value="0"></div></div>
    
    <div class="p-4 rounded-4 bg-black border border-secondary mb-4"><h5 class="text-white mb-3"><i class="bi bi-camera text-info"></i> Provas (Cloudinary)</h5><div class="input-group mb-4"><input type="file" class="form-control bg-dark text-white" id="osFileInput" accept="image/*,video/*"><button class="btn btn-info text-dark" type="button" onclick="uploadOsMedia()" id="btnUploadMedia">UPLOAD</button></div><div class="d-flex gap-3 overflow-x-auto pb-2" id="osMediaGrid"></div></div>
    
    <div class="p-4 rounded-4 bg-black border border-secondary"><h5 class="text-warning mb-3">Checklist Técnico</h5><div class="row g-4 mb-4"><div class="col-md-6"><input type="number" class="form-control border-warning bg-dark text-white" id="chkPneuDia" placeholder="Desgaste Pneu Diant (%)"></div><div class="col-md-6"><input type="number" class="form-control border-warning bg-dark text-white" id="chkPneuTra" placeholder="Desgaste Pneu Tras (%)"></div><div class="col-md-4"><select class="form-select bg-dark text-white" id="chkComb"><option>Comb: N/A</option><option>Reserva</option><option>Meio</option><option>Cheio</option></select></div><div class="col-md-8 d-flex gap-3"><div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="chkPainel"><label class="text-white">Painel</label></div><div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="chkPneusOk"><label class="text-white">Pressão</label></div><div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="chkCare"><label class="text-white">Carenagem</label></div></div></div><textarea class="form-control border-danger bg-dark text-white" id="chkObs" rows="2" placeholder="Avarias prévias / Arranhões..."></textarea></div>
    
    <div class="mt-4 p-4 border-top border-secondary d-flex justify-content-between bg-black rounded-4"><button type="button" class="btn btn-outline-light px-4" data-bs-dismiss="modal">Fechar</button><button type="submit" class="btn btn-info btn-lg px-5 fw-bold text-dark shadow" id="btnSalvarOS"><i class="bi bi-hdd-fill"></i> SALVAR SERVIÇO</button></div>
</form></div></div></div></div>
<footer class="mt-auto"><p class="mb-0 text-white-50">SaaS Platform <b>Powered by thIAguinho Soluções</b> &copy; 2026</p></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const $ = id => document.getElementById(id); const $v = id => $(id) ? $(id).value : '';
    function showToast(msg) { const d = document.createElement('div'); d.innerHTML = `<div class="toast align-items-center text-white bg-info border-0 show shadow-lg p-3 mt-2 rounded"><div class="d-flex"><div class="toast-body fw-bold text-dark">${msg}</div><button type="button" class="btn-close m-auto" data-bs-dismiss="toast"></button></div></div>`; $('toastContainer')?.appendChild(d.firstChild); setTimeout(() => $('toastContainer').firstChild?.remove(), 4000); }
    const tenantId = sessionStorage.getItem('evo_tenant_id'); const funcId = sessionStorage.getItem('evo_func_id'); const funcNome = sessionStorage.getItem('evo_func_nome');
    if (!tenantId || sessionStorage.getItem('evo_user_role') !== 'equipe') { window.location.replace('index.html'); } else { $('navTenantName').innerText = sessionStorage.getItem('evo_tenant_nome'); $('navUserName').innerText = funcNome; }
    function sair() { sessionStorage.clear(); window.location.href = 'index.html'; }
    const firebaseConfig = { apiKey: "AIzaSyAq6gEJlUGuzJmrNf-lVY0cqdOWsJ9xNeo", authDomain: "evolution-179d0.firebaseapp.com", projectId: "evolution-179d0", storageBucket: "evolution-179d0.firebasestorage.app", messagingSenderId: "349908951188", appId: "1:349908951188:web:457832d484a83f45b19481" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
    let dbEstoque=[], dbClientes=[], dbMotos=[], dbServicos=[];
    document.addEventListener('DOMContentLoaded', () => {
        db.collection('estoqueItems').where('tenantId', '==', tenantId).onSnapshot(s => { dbEstoque = s.docs.map(d=>({id:d.id,...d.data()})); });
        db.collection('clientes').where('tenantId', '==', tenantId).onSnapshot(s => { dbClientes = s.docs.map(d=>({id:d.id,...d.data()})); if($('osCliente')) $('osCliente').innerHTML='<option value="">Cliente...</option>'+dbClientes.map(c=>`<option value="${c.id}">${c.nome}</option>`).join(''); });
        db.collection('motos').where('tenantId', '==', tenantId).onSnapshot(s => { dbMotos = s.docs.map(d=>({id:d.id,...d.data()})); });
        db.collection('servicos').where('tenantId', '==', tenantId).onSnapshot(s => { dbServicos = s.docs.map(d=>({id:d.id,...d.data()})); renderKanban(); });
    });
    function renderKanban() {
        const tB = $('searchOS')?.value.toLowerCase().trim() || ''; const c = { 'Aguardando':[], 'Orcamento':[], 'Aprovado':[], 'Andamento':[], 'Concluido':[] };
        dbServicos.forEach(os => { const cl = dbClientes.find(x=>x.id===os.clienteId); const mt = dbMotos.find(x=>x.id===os.motoId); if(tB==='' || mt?.placa.toLowerCase().includes(tB) || cl?.nome.toLowerCase().includes(tB)) { if(c[os.status]) c[os.status].push(os); } });
        for(const [s, l] of Object.entries(c)) { if($(`count-${s}`)) $(`count-${s}`).innerText = l.length; if($(`kb-${s}`)) $(`kb-${s}`).innerHTML = l.sort((a,b)=>new Date(b.data)-new Date(a.data)).map(os => { const cl = dbClientes.find(x=>x.id===os.clienteId); const mt = dbMotos.find(x=>x.id===os.motoId); return `<div class="k-card"><div class="d-flex justify-content-between mb-2"><span class="k-placa text-info">${mt?.placa||'-'}</span><small class="text-white-50">${new Date(os.data).toLocaleDateString('pt-BR')}</small></div><p class="text-white fw-bold mb-1 lh-sm">${cl?.nome||'-'}</p><p class="small text-white-50 text-truncate mb-3">${os.desc}</p><button class="btn btn-sm btn-outline-info w-100 fw-bold border-2" onclick="prepararModalOS('edit','${os.id}')" data-bs-toggle="modal" data-bs-target="#modalOS"><i class="bi bi-gear-fill me-1"></i> ABRIR</button></div>`; }).join(''); }
    }
    function filtrarMotosOS() { const cid=$v('osCliente'); if($('osMoto')) $('osMoto').innerHTML='<option value="">Veículo...</option>'+dbMotos.filter(m=>m.clienteId===cid).map(m=>`<option value="${m.id}">${m.modelo} (${m.placa})</option>`).join(''); }
    function adicionarPecaOS() { const div = document.createElement('div'); div.className='d-flex mb-3 gap-2 p-3 bg-dark rounded border border-secondary item-os-peca'; div.innerHTML=`<select class="form-select os-peca-sel bg-black text-white" onchange="calcOsTotal()"><option value="">Catálogo...</option>${dbEstoque.map(i=>`<option value="${i.id}" data-p="${i.venda}">${i.nome} - R$ ${i.venda.toFixed(2)} (${i.qtd})</option>`).join('')}</select><input type="number" class="form-control text-center os-peca-qtd fw-bold bg-black text-white" style="width:100px" value="1" min="1" oninput="calcOsTotal()"><button type="button" class="btn btn-danger" onclick="this.parentElement.remove(); calcOsTotal()"><i class="bi bi-trash"></i></button>`; $('containerPecasOS')?.appendChild(div); }
    function calcOsTotal() { let m=parseFloat($v('osMaoObra'))||0; let p=0; document.querySelectorAll('.item-os-peca').forEach(el=>{ const s=el.querySelector('.os-peca-sel'); if(s.value) p+=parseFloat(s.options[s.selectedIndex].getAttribute('data-p'))*parseInt(el.querySelector('.os-peca-qtd').value); }); const t = m+p; if($('osTotalValor')) $('osTotalValor').innerText=t.toFixed(2); if($('osTotalHidden')) $('osTotalHidden').value=t.toFixed(2); }
    async function uploadOsMedia() { const input = $('osFileInput'); if(!input || !input.files || input.files.length === 0) return; const btn = $('btnUploadMedia'); btn.innerHTML = "<i class='bi bi-arrow-repeat spin'></i>"; btn.disabled = true; try { const fd = new FormData(); fd.append('file', input.files[0]); fd.append('upload_preset', 'evolution'); const res = await fetch(`https://api.cloudinary.com/v1_1/dmuvm1o6m/auto/upload`, { method: 'POST', body: fd }); const data = await res.json(); if(data.secure_url) { const a = JSON.parse($v('osMediaArray') || '[]'); a.push({ url: data.secure_url, type: data.resource_type }); $('osMediaArray').value = JSON.stringify(a); renderOsMediaGallery(); input.value = ''; } } catch(e) {} btn.innerHTML = "UPLOAD"; btn.disabled = false; }
    function renderOsMediaGallery() { const a = JSON.parse($v('osMediaArray') || '[]'); if($('osMediaGrid')) $('osMediaGrid').innerHTML = a.map((m, idx) => { const inner = (m.type === 'video' || m.url.includes('.mp4')) ? `<video src="${m.url}" controls class="shadow-sm rounded" style="width:100px;height:100px;object-fit:cover;"></video>` : `<img src="${m.url}" onclick="window.open('${m.url}')" class="shadow-sm rounded" style="width:100px;height:100px;object-fit:cover;cursor:pointer;">`; return `<div class="position-relative d-inline-block me-2 mb-2 flex-shrink-0">${inner}<button type="button" class="btn-del-media" onclick="delOsMedia(${idx})"><i class="bi bi-x"></i></button></div>`; }).join(''); }
    function delOsMedia(idx) { const a = JSON.parse($v('osMediaArray')); a.splice(idx, 1); $('osMediaArray').value = JSON.stringify(a); renderOsMediaGallery(); }
    let osAtualParaSalvar = null; 
    function prepararModalOS(m, id='') {
        $('formOS')?.reset(); $('containerPecasOS').innerHTML=''; $('osData').value=new Date().toISOString().split('T')[0]; $('osTotalValor').innerText="0.00"; $('osTotalHidden').value=0; $('osMediaArray').value='[]'; renderOsMediaGallery();
        if(m==='edit') {
            const o=dbServicos.find(x=>x.id===id); osAtualParaSalvar = o; $('osId').value=o.id; $('osCliente').value=o.clienteId; filtrarMotosOS(); setTimeout(() => { $('osMoto').value=o.motoId; }, 300); $('osDescricao').value=o.desc; $('osStatus').value=o.status; $('osMaoObra').value=o.maoObra||0;
            if(o.pecas){ o.pecas.forEach(p=>{ adicionarPecaOS(); const ss=document.querySelectorAll('.os-peca-sel'); const ls=ss[ss.length-1]; ls.value=p.id; ls.nextElementSibling.value=p.qtd; }); }
            if(o.check){ $('chkComb').value=o.check.comb; $('chkPainel').checked=o.check.painel; $('chkPneusOk').checked=o.check.pneus; $('chkCare').checked=o.check.care; $('chkObs').value=o.check.obs||''; $('chkPneuDia').value=o.check.pneuDia; $('chkPneuTra').value=o.check.pneuTra; }
            if(o.media) { $('osMediaArray').value = JSON.stringify(o.media); renderOsMediaGallery(); } calcOsTotal();
        } else { osAtualParaSalvar = null; $('osId').value=''; }
    }
    async function salvarOS(e) {
        e.preventDefault(); const btn = $('btnSalvarOS'); const txt = btn.innerHTML; btn.innerHTML = 'GRAVANDO...'; btn.disabled = true;
        try {
            const id=$v('osId'); const sts=$v('osStatus'); const tot=parseFloat($v('osTotalHidden')); const arrP=[]; document.querySelectorAll('.item-os-peca').forEach(el=>{ const sel = el.querySelector('.os-peca-sel'); const ids = sel.value; const n = sel.options[sel.selectedIndex].text.split(' - ')[0]; if(ids) arrP.push({id:ids, nome: n, qtd:parseInt(el.querySelector('.os-peca-qtd').value)}); });
            let tl = osAtualParaSalvar?.timeline ? [...osAtualParaSalvar.timeline] : []; if(!id) tl.push({ data: new Date().toISOString(), acao: 'Abertura da O.S. (Equipe)', usuario: funcNome }); else if(osAtualParaSalvar && osAtualParaSalvar.status !== sts) tl.push({ data: new Date().toISOString(), acao: `Status alterado para ${sts}`, usuario: funcNome });
            // CUIDADO: O funcionário mecânico NÃO BAIXA ESTOQUE e NÃO GERA FINANCEIRO. Quem faz isso é o Gerente/Dono no painel Admin quando conclui e define o pagamento. A Equipe apenas envia as infos.
            const d = { tenantId, clienteId:$v('osCliente'), motoId:$v('osMoto'), desc:$v('osDescricao'), status:sts, mecId: funcId, data:$v('osData'), maoObra:parseFloat($v('osMaoObra')), total:tot, pecas:arrP, media: JSON.parse($v('osMediaArray') || '[]'), timeline: tl, check: { comb:$v('chkComb'), painel:$('chkPainel')?.checked||false, pneus:$('chkPneusOk')?.checked||false, care:$('chkCare')?.checked||false, obs:$v('chkObs'), pneuDia: parseInt($v('chkPneuDia'))||0, pneuTra: parseInt($v('chkPneuTra'))||0 } };
            if(id) await db.collection('servicos').doc(id).update(d); else await db.collection('servicos').add(d); 
            bootstrap.Modal.getInstance($('modalOS'))?.hide(); showToast("Ficha enviada ao Gerente.");
        } catch(err) { showToast(err.message); } finally { btn.innerHTML = txt; btn.disabled = false; }
    }
</script>
</body>
</html>
