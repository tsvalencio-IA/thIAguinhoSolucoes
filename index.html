<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution SaaS - Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>body{background-color:#0f172a;font-family:'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;color:#fff;}.login-card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:40px;width:100%;max-width:450px;box-shadow:0 20px 40px rgba(0,0,0,0.5);}.form-control{background-color:#0f172a!important;border:1px solid #334155!important;color:#fff!important;padding:12px 15px;border-radius:8px;}.form-control:focus{border-color:#e65100!important;box-shadow:0 0 0 0.25rem rgba(230,81,0,0.25);}.btn-primary{background-color:#e65100;border:none;font-weight:bold;padding:12px;border-radius:8px;font-size:1.1rem;transition:0.3s;}.btn-primary:hover{background-color:#c94400;transform:translateY(-2px);}.toast-container{position:fixed;top:20px;right:20px;z-index:1055;}</style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="login-card text-center">
        <i class="bi bi-hexagon-fill display-1" style="color: #e65100;"></i>
        <h2 class="fw-bold mt-3 mb-1">EVOLUTION</h2>
        <p class="text-white-50 mb-4">Plataforma de Gestão Automotiva</p>
        
        <form onsubmit="fazerLogin(event)">
            <div class="mb-3 text-start">
                <label class="form-label text-white-50 fw-bold small text-uppercase">Usuário de Acesso</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-white-50"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="usr" required placeholder="Dono ou Mecânico">
                </div>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label text-white-50 fw-bold small text-uppercase">Senha</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-white-50"><i class="bi bi-key"></i></span>
                    <input type="password" class="form-control" id="pwd" required placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 shadow" id="btnAcesso">ENTRAR NO SISTEMA</button>
        </form>
        <div class="mt-4 pt-3 border-top border-secondary">
            <small class="text-white-50 fw-bold">Powered by thIAguinho Soluções</small>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAq6gEJlUGuzJmrNf-lVY0cqdOWsJ9xNeo", authDomain: "evolution-179d0.firebaseapp.com", projectId: "evolution-179d0", storageBucket: "evolution-179d0.firebasestorage.app", messagingSenderId: "349908951188", appId: "1:349908951188:web:457832d484a83f45b19481" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

        function showToast(msg) {
            const t = document.createElement('div');
            t.innerHTML = `<div class="toast align-items-center text-white bg-danger border-0 show p-3 mt-2 shadow-lg rounded" role="alert"><div class="d-flex"><div class="toast-body fw-bold">${msg}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>`;
            document.getElementById('toastContainer').appendChild(t.firstChild);
            setTimeout(() => document.getElementById('toastContainer').firstChild?.remove(), 4000);
        }

        async function fazerLogin(e) {
            e.preventDefault();
            const usr = document.getElementById('usr').value.trim();
            const pwd = document.getElementById('pwd').value.trim();
            const btn = document.getElementById('btnAcesso');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Autenticando...';
            btn.disabled = true;

            try {
                // 1. TENTA LOGAR COMO DONO DA OFICINA (ADMIN)
                const snapOficina = await db.collection('oficinas').where('usuario', '==', usr).get();
                
                if (!snapOficina.empty) {
                    const doc = snapOficina.docs[0];
                    const dados = doc.data();
                    
                    if (dados.senha !== pwd) { showToast('Senha incorreta.'); }
                    else if (dados.status === 'Bloqueado') { showToast('Licença Bloqueada. Contate a thIAguinho Soluções.'); }
                    else {
                        sessionStorage.setItem('evo_tenant_id', doc.id);
                        sessionStorage.setItem('evo_tenant_nome', dados.nomeFantasia);
                        sessionStorage.setItem('evo_user_role', 'admin');
                        sessionStorage.setItem('evo_tenant_mods', JSON.stringify(dados.modulos || {}));
                        window.location.href = 'admin.html';
                    }
                } else {
                    // 2. TENTA LOGAR COMO EQUIPE (MECÂNICO/GERENTE)
                    const snapFunc = await db.collection('funcionarios').where('usuario', '==', usr).get();
                    
                    if (!snapFunc.empty) {
                        const docF = snapFunc.docs[0];
                        const dadosF = docF.data();
                        
                        if (dadosF.senha !== pwd) { showToast('Senha incorreta.'); }
                        else {
                            // Verifica se a oficina mãe dele está bloqueada
                            const ofcMae = await db.collection('oficinas').doc(dadosF.tenantId).get();
                            if(!ofcMae.exists || ofcMae.data().status === 'Bloqueado') {
                                showToast('A Licença desta oficina encontra-se bloqueada.');
                            } else {
                                sessionStorage.setItem('evo_tenant_id', dadosF.tenantId);
                                sessionStorage.setItem('evo_tenant_nome', ofcMae.data().nomeFantasia);
                                sessionStorage.setItem('evo_func_id', docF.id);
                                sessionStorage.setItem('evo_func_nome', dadosF.nome);
                                sessionStorage.setItem('evo_user_role', 'equipe');
                                window.location.href = 'equipe.html';
                            }
                        }
                    } else {
                        showToast('Usuário não localizado no sistema.');
                    }
                }
            } catch (err) {
                console.error(err);
                showToast('Erro de conexão com o Banco de Dados.');
            }
            btn.innerHTML = 'ENTRAR NO SISTEMA';
            btn.disabled = false;
        }
    </script>
</body>
</html>
